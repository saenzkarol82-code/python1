<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Becas ADSO</title>

    <style>
        body {
            background: #f4f4f4;
            font-family: Arial;
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: white;
            padding: 25px 35px;
            border-radius: 10px;
            box-shadow: 0px 0px 8px rgba(0,0,0,0.2);
            text-align: center;
            width: 350px;
        }

        input {
            padding: 8px;
            width: 90%;
            margin-top: 10px;
            margin-bottom: 15px;
        }

        button {
            padding: 10px;
            width: 100%;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .msg {
            margin-top: 10px;
            font-size: 16px;
            font-weight: bold;
            color: #333;
        }

        h2 {
            margin-bottom: 5px;
        }

        p {
            color: #666;
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="card">

    <h2>Registro de Becas</h2>
    <p>Ingrese la información del estudiante</p>

    <form method="POST">

        <input
            type="text"
            name="documento"
            placeholder="Documento"
            required
        >

        <input
            type="text"
            name="nombre"
            placeholder="Nombre completo"
            required
        >
        <input
            type="email"
            name="correo"
            placeholder="Correo electrónico"
            required
        >

        <input
            type="text"
            name="programa"
            placeholder="Programa de formación"
            required
        >

        <input
            type="number"
            name="puntaje"
            placeholder="Puntaje (0 - 100)"
            min="0"
            max="100"
            step="0.01"
            required
        >

        <button type="submit">
            Registrar Estudiante
        </button>

        <div>
        

        <a href="/consulta">
            <button type="button">
                Ver Registros
            </button>
        </a>

    </form>

    {% if mensaje %}
        <p class="msg">{{ mensaje }}</p>
    {% endif %}

</div>

</body>
</html>
